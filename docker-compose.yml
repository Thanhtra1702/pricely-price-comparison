services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pricebot
      POSTGRES_USER: pricebot
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricebot -d pricebot"]
      interval: 5s
      timeout: 3s
      retries: 15

  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgresql+psycopg://pricebot:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/pricebot"
      CORS_ORIGINS: http://localhost:3000
      SPARK_LOCAL_IP: 127.0.0.1
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ivy_cache:/root/.ivy2
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  ivy_cache:
